<!DOCTYPE html>
<!-- 
    Author: Jialin Guo
    Purpose: This is a Django template file serving as the entry point for the React frontend application.
    Description: The file defines the basic structure of the webpage, including:
        - Page metadata (character set, viewport settings, title, etc.)
        - Loading static resources (custom favicon, Material UI font and icons, CSS stylesheets)
        - The main body of the page, containing a div with id "app", where the React application will be mounted and rendered.
        - The main JavaScript file (main.js) generated by Webpack, containing all the logic and components of the React application.

    这是一个Django模板文件，作为React前端应用的入口页面。
    该文件定义了网页的基本结构，包括：
    - 页面元信息（字符集、视口设置、标题等）
    - 加载静态资源（自定义图标favicon、Material UI字体和图标、CSS样式表）
    - 页面主体包含一个id为"app"的div，React应用将在这里挂载和渲染。
    - 引入Webpack打包生成的主JavaScript文件(main.js)，该文件包含了React应用的全部逻辑和组件。

    前后端分离的标准设计：Django负责返回基础HTML和静态资源，React负责动态渲染交互和页面内容。
    React依赖这个Django模板文件来“挂载”运行，如果不写这个模板，页面就无法正常加载和显示你的React应用。
    通过这个模板，Django后端能够将React编译生成的静态文件和入口HTML一起发送给浏览器，
    以实现前后端分离的单页应用（SPA）渲染。
-->
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Future Auto Garage</title>
    {% load static %}    <!-- Custom Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'images/myIcon.ico' %}">
    <!-- Material UI Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{% static "css/index.css" %}">
   
    </head>
<body>
    <!-- Warp the app -->
    <div id="main">
        <!-- React will mount here -->
        <div id="app"></div>
    </div>

    <!-- Webpack bundled JS -->
    <script src="{% static "frontend/main.js" %}"></script>
</body>
</html>
